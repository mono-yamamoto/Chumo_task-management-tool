# lefthook.yml - pre-commit hooks configuration

glob_matcher: doublestar

pre-commit:
  parallel: false
  commands:
    # 1. gitleaks: 機密情報チェック（最優先）
    gitleaks:
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "Error: gitleaks is not installed. 機密情報チェックを実行できません。"
          echo "コミットを中止します。gitleaksをインストールしてください："
          echo "  macOS: brew install gitleaks"
          echo "  Windows: https://github.com/gitleaks/gitleaks/releases からダウンロード"
          exit 1
        fi
        gitleaks protect --staged

    # 2. oxlint (フロントエンド)
    oxlint:
      glob: 'frontend/src/**/*.{ts,tsx}'
      run: npx oxlint --fix -c frontend/.oxlintrc.json {staged_files}
      stage_fixed: true
      skip_empty: true

    # 3. tsc (フロントエンド型チェック)
    tsc-frontend:
      glob: 'frontend/src/**/*.{ts,tsx}'
      run: bun run frontend:type-check
      skip_empty: true

    # 4. tsc (バックエンド型チェック)
    tsc-backend:
      glob: 'backend/src/**/*.ts'
      run: bun run backend:type-check
      skip_empty: true

    # 5. oxfmt (全体)
    oxfmt:
      glob: '**/*.{ts,tsx,js,jsx,json,md,css,scss,yaml,yml}'
      exclude:
        - 'node_modules/**'
        - '*.config.js'
        - '*.config.mjs'
        - 'bun.lock'
      run: npx oxfmt {staged_files}
      stage_fixed: true
      skip_empty: true
